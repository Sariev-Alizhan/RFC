<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Red Flag Community</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-v3.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v3.png">
<meta name="theme-color" content="#E11236">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Archivo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Archivo',sans-serif;color:#0B0B0B;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;line-height:1.55;-webkit-font-smoothing:antialiased}
.flag img{width:72px;height:auto;margin-bottom:28px}
.code{font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:clamp(96px,22vw,200px);line-height:.9;letter-spacing:-.04em;color:#0B0B0B;margin-bottom:18px}
h1{font-weight:900;font-size:clamp(20px,3vw,28px);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
p{max-width:42ch;color:#555;font-size:15px;margin-bottom:34px}
.btn{display:inline-flex;align-items:center;gap:10px;background:#0B0B0B;color:#fff;border-radius:999px;padding:16px 36px;font-weight:700;font-size:13.5px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:.25s}
.btn:hover{background:#E11236;transform:translateY(-2px);box-shadow:0 16px 34px rgba(225,18,54,.28)}
.brand{margin-top:48px;font-family:'Playfair Display',serif;font-weight:800;color:#E11236;font-size:26px;letter-spacing:.04em}
</style>
</head>
<body>
<div class="flag"><picture><source srcset="/img/brand/flag.webp" type="image/webp"><img src="/img/brand/flag.png" alt="Red Flag Community" width="72" height="72"></picture></div>
<div class="code">404</div>
<h1>Страница не найдена</h1>
<p>Похоже, эта страница ушла в дроп, который ещё не вышел. Вернись на главную — там всё на месте.</p>
<a class="btn" href="/">На главную →</a>
<div class="brand">RFC</div>
</body>
</html>
